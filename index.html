<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA 2026 Ball Animation</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a1628;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #field {
      position: relative;
      width: 800px;
      height: 500px;
      background: radial-gradient(ellipse at center, #2d7a2d 0%, #1a5c1a 60%, #0f3d0f 100%);
      border: 3px solid #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 200, 0, 0.25);
    }

    #field::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 100%;
      background: rgba(255, 255, 255, 0.6);
    }

    #field::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border: 3px solid rgba(255, 255, 255, 0.6);
      border-radius: 50%;
    }

    #ball {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.55) 0%, transparent 55%),
        repeating-conic-gradient(#fff 0deg 30deg, #222 30deg 60deg);
      background-blend-mode: normal;
      box-shadow:
        inset -4px -4px 10px rgba(0, 0, 0, 0.5),
        inset 2px 2px 6px rgba(255, 255, 255, 0.3),
        0 4px 12px rgba(0, 0, 0, 0.5);
      animation:
        ballPulse 2.3s ease-in-out infinite,
        ballSpin  0.8s linear infinite;
      will-change: transform;
    }

    @keyframes ballPulse {
      0%   { transform: scale(1);   }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1);   }
    }

    @keyframes ballSpin {
      0%   { transform: rotate(0deg);   }
      100% { transform: rotate(360deg); }
    }

    #ui {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 6px 18px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
      user-select: none;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    #score {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div id="field">
  <div id="score">&#9917; FIFA 2026 — Ball Animation Demo</div>
  <div id="ball"></div>

  <div id="ui">
    <button class="btn" id="btnPause">Pause</button>
    <button class="btn" id="btnReset">Reset</button>
    <button class="btn" id="btnFast">Fast</button>
    <button class="btn" id="btnSlow">Slow</button>
  </div>
</div>

<script>
  /**
   * Configuration constants for ball movement.
   * All magic numbers are centralised here.
   */
  const CONFIG = Object.freeze({
    BALL_SIZE:          40,
    INITIAL_VELOCITY_X: 3.2,
    INITIAL_VELOCITY_Y: 2.4,
    MIN_VELOCITY:       0.5,
    MAX_VELOCITY:      10.0,
    SPEED_STEP:         0.8,
    DAMPING:            1.0,
  });

  /**
   * Mutable animation state — kept in a single object to avoid
   * polluting the global scope.
   */
  const state = {
    x:      0,
    y:      0,
    vx:     CONFIG.INITIAL_VELOCITY_X,
    vy:     CONFIG.INITIAL_VELOCITY_Y,
    paused: false,
    rafId:  null,
  };

  /* DOM references */
  const field    = document.getElementById('field');
  const ball     = document.getElementById('ball');
  const btnPause = document.getElementById('btnPause');
  const btnReset = document.getElementById('btnReset');
  const btnFast  = document.getElementById('btnFast');
  const btnSlow  = document.getElementById('btnSlow');

  /**
   * Returns the maximum x/y coordinates the ball centre may occupy
   * so the ball stays fully inside the field.
   *
   * @returns {{ maxX: number, maxY: number }}
   */
  function getBounds() {
    return {
      maxX: field.clientWidth  - CONFIG.BALL_SIZE,
      maxY: field.clientHeight - CONFIG.BALL_SIZE,
    };
  }

  /**
   * Clamps `value` to the closed interval [min, max].
   *
   * @param {number} value
   * @param {number} min
   * @param {number} max
   * @returns {number}
   */
  function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
  }

  /**
   * Computes a perfectly-elastic wall bounce along one axis.
   * If the position overshoots the boundary the velocity is reversed
   * and the position is snapped to the boundary edge.
   *
   * @param {number} pos - current position (px)
   * @param {number} vel - current velocity (px/frame)
   * @param {number} max - maximum allowed position (px)
   * @returns {{ pos: number, vel: number }}
   */
  function bounce(pos, vel, max) {
    let p = pos;
    let v = vel * CONFIG.DAMPING;

    if (p <= 0) {
      p = 0;
      v = Math.abs(v);
    } else if (p >= max) {
      p = max;
      v = -Math.abs(v);
    }

    return { pos: p, vel: v };
  }

  /**
   * Moves the ball element to position (x, y) using CSS left/top so that
   * the CSS transform property remains exclusively owned by the keyframe
   * animations (ballPulse and ballSpin), preventing any visual conflict.
   *
   * @param {number} x - horizontal position in px
   * @param {number} y - vertical position in px
   */
  function renderBall(x, y) {
    ball.style.left = x + 'px';
    ball.style.top  = y + 'px';
  }

  /**
   * One animation frame: advance position, apply bounce, render, schedule next.
   */
  function tick() {
    if (state.paused) return;

    const { maxX, maxY } = getBounds();

    state.x += state.vx;
    state.y += state.vy;

    const bx = bounce(state.x, state.vx, maxX);
    const by = bounce(state.y, state.vy, maxY);

    state.x  = bx.pos;
    state.vx = bx.vel;
    state.y  = by.pos;
    state.vy = by.vel;

    renderBall(state.x, state.y);

    state.rafId = requestAnimationFrame(tick);
  }

  /**
   * Starts (or restarts) the requestAnimationFrame loop.
   */
  function startLoop() {
    if (state.rafId !== null) {
      cancelAnimationFrame(state.rafId);
    }
    state.rafId = requestAnimationFrame(tick);
  }

  /**
   * Toggles between paused and running states.
   */
  function togglePause() {
    state.paused = !state.paused;
    btnPause.textContent = state.paused ? 'Resume' : 'Pause';
    if (!state.paused) {
      startLoop();
    }
  }

  /**
   * Resets the ball to its initial position and velocity.
   */
  function resetBall() {
    state.x      = 0;
    state.y      = 0;
    state.vx     = CONFIG.INITIAL_VELOCITY_X;
    state.vy     = CONFIG.INITIAL_VELOCITY_Y;
    state.paused = false;
    btnPause.textContent = 'Pause';
    renderBall(state.x, state.y);
    startLoop();
  }

  /**
   * Increases the ball speed by SPEED_STEP, clamped to MAX_VELOCITY.
   */
  function increasSpeed() {
    const sign = function(v) { return v >= 0 ? 1 : -1; };
    state.vx = clamp(Math.abs(state.vx) + CONFIG.SPEED_STEP, CONFIG.MIN_VELOCITY, CONFIG.MAX_VELOCITY) * sign(state.vx);
    state.vy = clamp(Math.abs(state.vy) + CONFIG.SPEED_STEP, CONFIG.MIN_VELOCITY, CONFIG.MAX_VELOCITY) * sign(state.vy);
  }

  /**
   * Decreases the ball speed by SPEED_STEP, clamped to MIN_VELOCITY.
   */
  function decreaseSpeed() {
    const sign = function(v) { return v >= 0 ? 1 : -1; };
    state.vx = clamp(Math.abs(state.vx) - CONFIG.SPEED_STEP, CONFIG.MIN_VELOCITY, CONFIG.MAX_VELOCITY) * sign(state.vx);
    state.vy = clamp(Math.abs(state.vy) - CONFIG.SPEED_STEP, CONFIG.MIN_VELOCITY, CONFIG.MAX_VELOCITY) * sign(state.vy);
  }

  /* Button event listeners */
  btnPause.addEventListener('click', togglePause);
  btnReset.addEventListener('click', resetBall);
  btnFast.addEventListener('click',  increasSpeed);
  btnSlow.addEventListener('click',  decreaseSpeed);

  /* Keyboard shortcuts */
  document.addEventListener('keydown', function(e) {
    switch (e.key) {
      case ' ':
        e.preventDefault();
        togglePause();
        break;
      case 'r':
      case 'R':
        resetBall();
        break;
      case 'ArrowUp':
        increasSpeed();
        break;
      case 'ArrowDown':
        decreaseSpeed();
        break;
      default:
        break;
    }
  });

  /* Bootstrap */
  (function init() {
    renderBall(state.x, state.y);
    startLoop();
  })();

  /* Exported for unit testing */
  window.__fifa2026__ = {
    CONFIG,
    state,
    bounce,
    clamp,
    getBounds,
    togglePause,
    resetBall,
    increasSpeed,
    decreaseSpeed,
  };
</script>
</body>
</html>
