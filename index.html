<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA World Cup 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
    }

    /* ─── Hero ─────────────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
      background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #c9a84c 0%, #f5d080 50%, #c9a84c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1.1rem;
      color: #aaa;
      margin-top: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ─── Player Banner Section ─────────────────────────────────── */
    .player-banner {
      width: 100%;
      background: linear-gradient(135deg, #0d0d0d 0%, #1a1400 50%, #0d0d0d 100%);
      border-top: 1px solid #2a2000;
      border-bottom: 1px solid #2a2000;
      padding: 48px 0 52px;
      position: relative;
      overflow: hidden;
    }
    .player-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .banner-heading {
      text-align: center;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }
    .banner-heading h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: 0.12em;
      color: #c9a84c;
    }
    .banner-heading p {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ─── Carousel Wrapper ─────────────────────────────────────── */
    .carousel-outer {
      position: relative;
      width: 100%;
      overflow: hidden;
      padding: 12px 0;
    }
    .carousel-track {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
      will-change: transform;
      gap: 0;
    }

    /* ─── Player Card ───────────────────────────────────────────── */
    .player-card {
      flex: 0 0 calc(100% / 3);
      max-width: calc(100% / 3);
      padding: 0 16px;
      display: flex;
      justify-content: center;
    }
    .card-inner {
      background: linear-gradient(160deg, #1c1500 0%, #110f00 60%, #0d0d0d 100%);
      border: 1px solid #2e2200;
      border-radius: 16px;
      padding: 28px 22px 24px;
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card-inner::before {
      content: '';
      position: absolute;
      top: -40%;
      left: -40%;
      width: 180%;
      height: 180%;
      background: radial-gradient(circle at 50% 40%, rgba(201,168,76,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .card-inner:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(201, 168, 76, 0.18);
    }

    /* Photo */
    .card-photo-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      flex-shrink: 0;
    }
    .card-photo-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c9a84c, #f5d080, #9a7520, #c9a84c);
      z-index: 0;
    }
    .card-photo-wrap::after {
      content: '';
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(201,168,76,0.25), transparent);
      z-index: 0;
    }
    .card-photo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      position: relative;
      z-index: 1;
      display: block;
      background: #1a1a1a;
    }

    /* Name */
    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      color: #f5e9c8;
      text-align: center;
      line-height: 1.1;
    }

    /* Country */
    .card-country {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: #aaa;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .card-flag { font-size: 1.1rem; }

    /* Position badge */
    .card-position {
      background: rgba(201, 168, 76, 0.12);
      border: 1px solid rgba(201, 168, 76, 0.35);
      color: #c9a84c;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 3px 12px;
      border-radius: 20px;
      font-weight: 700;
    }

    /* Stats */
    .card-stats {
      display: flex;
      gap: 14px;
      justify-content: center;
      width: 100%;
      margin-top: 4px;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: #c9a84c;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.65rem;
      color: #777;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .stat-divider {
      width: 1px;
      height: 36px;
      background: #2a2000;
      align-self: center;
    }

    /* ─── Arrow Buttons ─────────────────────────────────────────── */
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 42px;
      height: 42px;
      background: rgba(201, 168, 76, 0.12);
      border: 1px solid rgba(201, 168, 76, 0.4);
      border-radius: 50%;
      color: #c9a84c;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }
    .carousel-btn:hover {
      background: rgba(201, 168, 76, 0.28);
      transform: translateY(-50%) scale(1.08);
    }
    .carousel-btn.prev { left: 16px; }
    .carousel-btn.next { right: 16px; }

    /* ─── Dot Indicators ─────────────────────────────────────────── */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 28px;
      position: relative;
      z-index: 1;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      border: 1px solid #444;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s, width 0.3s;
    }
    .dot.active {
      background: #c9a84c;
      border-color: #c9a84c;
      width: 22px;
      border-radius: 4px;
    }

    /* ─── Progress Bar ───────────────────────────────────────────── */
    .carousel-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, #c9a84c, #f5d080);
      width: 0%;
      transition: width linear;
      z-index: 5;
    }

    /* ─── Group Table Section ────────────────────────────────────── */
    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    .section h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      color: #c9a84c;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      text-align: center;
    }
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .group-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      overflow: hidden;
    }
    .group-card-header {
      background: linear-gradient(90deg, #1a1400, #111);
      border-bottom: 1px solid #2a2000;
      padding: 10px 16px;
    }
    .group-card-header h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: #c9a84c;
      letter-spacing: 0.1em;
    }
    .group-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .group-table th {
      padding: 8px 12px;
      text-align: left;
      color: #666;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 1px solid #1a1a1a;
    }
    .group-table td {
      padding: 9px 12px;
      border-bottom: 1px solid #161616;
      color: #ccc;
    }
    .group-table tr:last-child td { border-bottom: none; }
    .group-table tr:hover td { background: rgba(201,168,76,0.04); }
    .qualify { color: #c9a84c; font-weight: 700; }

    /* ─── Footer ────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 32px 20px;
      color: #444;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      border-top: 1px solid #1a1a1a;
    }

    /* ─── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .player-card {
        flex: 0 0 100%;
        max-width: 100%;
      }
      .carousel-btn.prev { left: 8px; }
      .carousel-btn.next { right: 8px; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .player-card {
        flex: 0 0 50%;
        max-width: 50%;
      }
    }
  </style>
</head>
<body>

  <!-- ── Hero ────────────────────────────────────────────────────── -->
  <section class="hero">

  <footer>

  <script>

      ]
    }
  ];

  /* ================================================================
     CAROUSEL ENGINE
  ================================================================ */
  (function () {
    const track       = document.getElementById('carouselTrack');
    const outer       = document.getElementById('carouselOuter');
    const dotsWrap    = document.getElementById('carouselDots');
    const btnPrev     = document.getElementById('btnPrev');
    const btnNext     = document.getElementById('btnNext');
    const progressBar = document.getElementById('carouselProgress');
    const banner      = document.getElementById('playerBanner');

    const INTERVAL_MS     = 3500;   // auto-advance every 3.5 s
    const VISIBLE_DESKTOP = 3;
    const VISIBLE_TABLET  = 2;
    const VISIBLE_MOBILE  = 1;

    let currentIndex  = 0;
    let autoTimer     = null;
    let progressTimer = null;
    let isPaused      = false;

    /* ── Helpers ──────────────────────────────────────────────── */
    function getVisible() {
      const w = window.innerWidth;
      if (w <= 768)  return VISIBLE_MOBILE;
      if (w <= 1024) return VISIBLE_TABLET;
      return VISIBLE_DESKTOP;
    }

    function totalSlides() {
      return PLAYERS.length;
    }

    function maxIndex() {
      return Math.max(0, totalSlides() - getVisible());
    }

    /* ── Build DOM ────────────────────────────────────────────── */
    function buildCards() {
      track.innerHTML = '';
      PLAYERS.forEach((p, i) => {
        const statsHTML = p.stats.map((s, si) => `
          ${si > 0 ? '<div class="stat-divider"></div>' : ''}
          <div class="stat-item">
            <span class="stat-value">${s.value}</span>
            <span class="stat-label">${s.label}</span>
          </div>
        `).join('');

        const card = document.createElement('div');
        card.className = 'player-card';
        card.setAttribute('aria-label', p.name);
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-photo-wrap">
              <img class="card-photo"
                   src="${p.photo}"
                   alt="${p.name}"
                   loading="lazy"
                   onerror="this.src='https://via.placeholder.com/110x110/1a1a1a/c9a84c?text=${encodeURIComponent(p.name.split(' ').map(n=>n[0]).join(''))}'" />
            </div>
            <div class="card-name">${p.name}</div>
            <div class="card-country">
              <span class="card-flag">${p.flag}</span>
              <span>${p.country}</span>
            </div>
            <div class="card-position">${p.position}</div>
            <div class="card-stats">${statsHTML}</div>
          </div>
        `;
        track.appendChild(card);
      });
    }

    function buildDots() {
      dotsWrap.innerHTML = '';
      const count = maxIndex() + 1;
      for (let i = 0; i <= maxIndex(); i++) {
        const dot = document.createElement('button');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
        dot.addEventListener('click', () => goTo(i));
        dotsWrap.appendChild(dot);
      }
    }

    /* ── Navigation ───────────────────────────────────────────── */
    function goTo(index) {
      currentIndex = Math.max(0, Math.min(index, maxIndex()));
      const cardWidth = 100 / getVisible();
      track.style.transform = `translateX(-${currentIndex * cardWidth}%)`;

      // update dots
      dotsWrap.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === currentIndex);
      });

      resetProgress();
    }

    function next() { goTo(currentIndex >= maxIndex() ? 0 : currentIndex + 1); }
    function prev() { goTo(currentIndex <= 0 ? maxIndex() : currentIndex - 1); }

    /* ── Auto-Rotate ──────────────────────────────────────────── */
    function startAuto() {
      stopAuto();
      if (isPaused) return;
      autoTimer = setInterval(next, INTERVAL_MS);
      startProgress();
    }

    function stopAuto() {
      clearInterval(autoTimer);
      autoTimer = null;
      stopProgress();
    }

    function startProgress() {
      progressBar.style.transition = 'none';
      progressBar.style.width = '0%';
      // Force reflow
      progressBar.getBoundingClientRect();
      progressBar.style.transition = `width ${INTERVAL_MS}ms linear`;
      progressBar.style.width = '100%';
    }

    function stopProgress() {
      progressBar.style.transition = 'none';
      progressBar.style.width = '0%';
    }

    function resetProgress() {
      stopProgress();
      if (!isPaused) startProgress();
    }

    /* ── Pause on Hover ───────────────────────────────────────── */
    banner.addEventListener('mouseenter', () => {
      isPaused = true;
      stopAuto();
    });
    banner.addEventListener('mouseleave', () => {
      isPaused = false;
      startAuto();
    });

    /* ── Arrow Buttons ────────────────────────────────────────── */
    btnPrev.addEventListener('click', () => { stopAuto(); prev(); if (!isPaused) startAuto(); });
    btnNext.addEventListener('click', () => { stopAuto(); next(); if (!isPaused) startAuto(); });

    /* ── Touch / Swipe ────────────────────────────────────────── */
    let touchStartX = 0;
    let touchEndX   = 0;

    outer.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
      stopAuto();
    }, { passive: true });

    outer.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      if (Math.abs(diff) > 40) {
        diff > 0 ? next() : prev();
      }
      if (!isPaused) startAuto();
    }, { passive: true });

    /* ── Keyboard ─────────────────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  { stopAuto(); prev(); if (!isPaused) startAuto(); }
      if (e.key === 'ArrowRight') { stopAuto(); next(); if (!isPaused) startAuto(); }
    });

    /* ── Resize ───────────────────────────────────────────────── */
    let resizeDebounce;
    window.addEventListener('resize', () => {
      clearTimeout(resizeDebounce);
      resizeDebounce = setTimeout(() => {
        buildDots();
        goTo(Math.min(currentIndex, maxIndex()));
        startAuto();
      }, 200);
    });

    /* ── Init ─────────────────────────────────────────────────── */
    buildCards();
    buildDots();
    goTo(0);
    startAuto();
  })();

  /* ================================================================

  (function () {
    const groups = [

          { name: "🇨🇦 Canada",   p:3, w:1, d:0, l:2, gd:"-3", pts:3  },

      {
